<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Live Hypixel SkyBlock Bazaar arbitrage board with sortable profit and liquidity data."
    />
    <meta name="theme-color" content="#07131f" />
    <title>Bazaar Arbitrage Board</title>
  </head>
  <body>
    <div id="app" aria-live="polite">
      <main
        style="
          min-height: 100vh;
          display: grid;
          place-items: center;
          padding: 32px;
          color: #ecf6ff;
          background: linear-gradient(180deg, #07131f, #02060d);
          font-family: system-ui, sans-serif;
        "
      >
        <div style="text-align: center; max-width: 32rem">
          <p style="margin: 0 0 12px; opacity: 0.72; letter-spacing: 0.08em; text-transform: uppercase">
            SkyBlock Bazaar
          </p>
          <h1 style="margin: 0 0 12px; font-size: clamp(2rem, 4vw, 3.5rem)">
            Loading arbitrage board...
          </h1>
          <p style="margin: 0; opacity: 0.82">
            Pulling live flip data and preparing the dashboard.
          </p>
        </div>
      </main>
    </div>
    <noscript>
      <div
        style="
          padding: 24px;
          color: #ecf6ff;
          background: #07131f;
          font-family: system-ui, sans-serif;
        "
      >
        JavaScript is required to load the live Bazaar dashboard.
      </div>
    </noscript>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
